[pytest]
# Tests live at the repo root as test_*.py and are runnable either via pytest
# or as plain scripts. This just makes `pytest` from the repo root canonical
# and cross-platform.
testpaths = .
python_files = test_*.py
addopts = -q --cov=. --cov-report=term-missing --cov-config=.coveragerc
# Silence only benign, non-actionable GC-timing noise: "unclosed database"
# ResourceWarning from sqlite3.Connection objects collected without an explicit
# close(). Connections we own are closed in fixtures; the residue comes from
# tests that legitimately spin up multiple app instances and from coverage.py's
# own data file. (The Starlette httpx deprecation and the Node-20 action notice
# are fixed at the source instead — see requirements-dev.txt / ci.yml.)
filterwarnings =
    ignore:unclosed database:ResourceWarning
